site_name: The Godfather Wiki
site_description: >-
  An open-source, wiki-style reference and critical analysis of The Godfather —
  Mario Puzo's novel, Francis Ford Coppola's film trilogy, the sequel novels,
  the spinoffs, and the people who made them.
site_url: https://joedef.github.io/godfather-wiki/
repo_url: https://github.com/joedef/godfather-wiki
repo_name: joedef/godfather-wiki
edit_uri: edit/main/docs/
copyright: >-
  Content licensed CC BY-SA 4.0 · Code licensed MIT · An independent fan project,
  not affiliated with or endorsed by Paramount Pictures or the Puzo estate.

theme:
  name: material
  custom_dir: overrides
  language: en
  icon:
    logo: material/book-open-page-variant
    repo: fontawesome/brands/github
  font:
    text: Source Sans 3
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Follow system theme
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.code.copy
    - content.tooltips

extra_css:
  - assets/extra.css

plugins:
  - search:
      separator: '[\s​\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/joedef/godfather-wiki
      name: This project on GitHub
  generator: false

